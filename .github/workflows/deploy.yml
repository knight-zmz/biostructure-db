name: 🚀 Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm install --production

    - name: 🧪 Run tests
      run: npm test -- --forceExit || true
      continue-on-error: true

    - name: 📤 Deploy to Server
      uses: easingthemes/ssh-deploy@v4.1.4
      env:
        SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        SSH_USER: ${{ secrets.DEPLOY_USER }}
        SSH_PORT: 22
        SOURCE: "."
        DEST: "/var/www/myapp"
        ARGS: "-rltgoDzvO --delete --exclude='node_modules' --exclude='.git' --exclude='coverage' --exclude='*.log' --exclude='.github'"

    - name: 🔄 Restart Application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: 22
        script: |
          echo "🚀 Starting deployment..."
          cd /var/www/myapp
          echo "📦 Installing dependencies..."
          npm install --production --silent
          echo "🔄 Restarting PM2..."
          pm2 restart myapp
          sleep 2
          echo "✅ Deployment complete!"
          pm2 status
          echo "📊 API Status:"
          curl -s http://localhost:3000/api/stats | head -c 100
