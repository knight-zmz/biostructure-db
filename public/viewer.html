<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioStructure DB - 3D Viewer</title>
  
  <!-- Molstar CSS -->
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/molstar@latest/build/viewer/molstar.css">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: white;
    }
    
    #header {
      background: linear-gradient(135deg, #0066cc, #00a3e0);
      padding: 20px;
      text-align: center;
    }
    
    #controls {
      padding: 20px;
      background: #16213e;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    #pdbInput {
      flex: 1;
      min-width: 200px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }
    
    #loadBtn, #randomBtn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #0066cc;
      color: white;
      cursor: pointer;
    }
    
    #viewer {
      width: 100%;
      height: calc(100vh - 150px);
    }
    
    #info {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 10px;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🧬 BioStructure DB - 3D Viewer</h1>
    <p>Molstar Integration</p>
  </div>
  
  <div id="controls">
    <input type="text" id="pdbInput" placeholder="输入 PDB ID (例如: 1CRN)" value="1CRN">
    <button id="loadBtn" onclick="loadStructure()">加载结构</button>
    <button id="randomBtn" onclick="loadRandom()">随机结构</button>
  </div>
  
  <div id="viewer"></div>
  
  <div id="info">
    <strong>结构信息</strong>
    <div id="structureInfo">未加载</div>
  </div>
  
  <!-- Molstar JS -->
  <script src="https://cdn.jsdelivr.net/npm/molstar@latest/build/viewer/molstar.js"></script>
  
  <script>
    let viewer;
    
    // 初始化 Molstar
    async function initViewer() {
      viewer = new molstar.Viewer('viewer', {
        layoutIsExpanded: true,
        layoutShowControls: false,
        layoutShowRemoteState: false,
        layoutShowSequence: false,
        layoutShowLog: false,
        layoutShowLeftPanel: false,
        
        viewportShowExpand: true,
        viewportShowSelectionMode: true,
        viewportShowAnimation: true,
        
        pdbProvider: 'rcsb',
        emdbProvider: 'rcsb',
      });
      
      console.log('Molstar viewer initialized');
    }
    
    // 加载 PDB 结构
    async function loadStructure() {
      const pdbId = document.getElementById('pdbInput').value.trim().toUpperCase();
      if (!pdbId) {
        alert('请输入 PDB ID');
        return;
      }
      
      try {
        document.getElementById('structureInfo').textContent = '加载中...';
        
        // 从 RCSB PDB 加载
        await viewer.loadPdb(pdbId);
        
        // 获取结构信息
        const response = await fetch(`https://data.rcsb.org/rest/v1/core/entry/${pdbId}`);
        const data = await response.json();
        
        document.getElementById('structureInfo').innerHTML = `
          <strong>${pdbId}</strong><br>
          标题: ${data.struct?.title || 'N/A'}<br>
          方法: ${data.exptl?.[0]?.method || 'N/A'}<br>
          分辨率: ${data.rcsb_entry_info?.resolution_combined?.[0] || 'N/A'} Å<br>
          发布日期: ${data.rcsb_accession_info?.initial_release_date || 'N/A'}
        `;
        
      } catch (err) {
        console.error('加载失败:', err);
        document.getElementById('structureInfo').textContent = '加载失败: ' + err.message;
      }
    }
    
    // 随机加载结构
    async function loadRandom() {
      try {
        const response = await fetch('/api/structures');
        const data = await response.json();
        
        if (data.success && data.data.length > 0) {
          const randomIndex = Math.floor(Math.random() * data.data.length);
          const randomStructure = data.data[randomIndex];
          document.getElementById('pdbInput').value = randomStructure.pdb_id;
          loadStructure();
        }
      } catch (err) {
        console.error('获取随机结构失败:', err);
      }
    }
    
    // 页面加载时初始化
    window.addEventListener('load', () => {
      initViewer();
      loadStructure();
    });
  </script>
</body>
</html>
