openapi: 3.0.0
info:
  title: BioStructure DB API
  version: 1.0.0
  description: Professional protein structure database API

servers:
  - url: http://localhost:3000
    description: Local server

paths:
  /api/stats:
    get:
      summary: Get database statistics
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object

  /api/structures:
    get:
      summary: List all structures
      responses:
        '200':
          description: Successful response

  /api/structures/{pdbId}:
    get:
      summary: Get structure details
      parameters:
        - name: pdbId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response

  /api/bio/search/structure:
    get:
      summary: Search structures
      parameters:
        - name: gene
          in: query
          schema:
            type: string
        - name: organism
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful response
